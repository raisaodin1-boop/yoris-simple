<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>YORIX - Marketplace Cameroun</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .hero {
      background: #22c55e;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 15px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .title {
      font-size: 14px;
      margin: 5px 0;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      background: #0f172a;
      color: white;
      border: none;
      padding: 8px;
      width: 100%;
      border-radius: 5px;
      margin-top: 5px;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 10px;
      font-size: 12px;
      background: #eee;
      margin-top: 20px;
    }
  </style>

</head>
