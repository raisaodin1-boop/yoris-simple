<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YORIX</title>

<style>
body{font-family:Arial;margin:0;background:#f1f3f6;}

.nav{
background:#131921;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.nav a{
color:white;
text-decoration:none;
margin:0 10px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
background:#131921;
color:white;
border:none;
padding:8px;
width:100%;
margin-top:5px;
}
</style>
</head>

<body>

<div class="nav">
<div>YORIX</div>
<div>
<a href="index.html">Accueil</a>
<a href="seller.html">Vendre</a>
<a href="admin.html">Admin</a>
</div>
</div>

<h2 style="padding:20px;">Produits</h2>

<div class="products" id="products"></div>

<script>

const products = [
{name:"Sac africain", price:15000},
{name:"Chaussures", price:20000},
{name:"Perruque", price:25000},
{name:"Poisson fumé", price:5000}
];

let container = document.getElementById("products");

products.forEach((p,i)=>{
container.innerHTML += `
<div class="card">
<h4>${p.name}</h4>
<p>${p.price} FCFA</p>
<button onclick="view(${i})">Voir</button>
</div>`;
});

function view(i){
localStorage.setItem("product", JSON.stringify(products[i]));
window.location.href="product.html";
}

</script>

</body>
</html>
