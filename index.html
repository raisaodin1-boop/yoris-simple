<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>YORIX - Marketplace Cameroun</title>

<style>
body {
font-family: Arial;
margin:0;
background:#f1f3f6;
}

.topbar {
display:flex;
justify-content:space-between;
padding:15px;
background:#131921;
color:white;
font-weight:bold;
}

.banner {
background:#00a859;
color:white;
text-align:center;
padding:12px;
font-size:14px;
}

.container {
padding:20px;
}

.section {
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.products {
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
}

.card {
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
position:relative;
}

.badge {
position:absolute;
top:8px;
left:8px;
background:#00a859;
color:white;
padding:3px 6px;
font-size:11px;
border-radius:5px;
}

.card img {
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

button {
background:#131921;
color:white;
border:none;
padding:10px;
margin-top:6px;
cursor:pointer;
border-radius:6px;
width:100%;
font-size:13px;
}

input {
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

.cart {
background:white;
padding:15px;
position:fixed;
right:10px;
top:70px;
width:260px;
display:none;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="topbar">
<div>YORIX 🇨🇲</div>
<button onclick="toggleCart()">🛒 (<span id="count">0</span>)</button>
</div>

<div class="banner">
Marketplace • Livraison • Paiement sécurisé
</div>

<div class="container">

<!-- PRODUITS -->
<div class="section">
<h3>Produits populaires</h3>
<div class="products" id="products"></div>
</div>

<!-- VENDEUR -->
<div class="section">
<h3>Devenir vendeur</h3>
<input id="vendorName" placeholder="Nom boutique">
<input id="vendorPhone" placeholder="WhatsApp">
<button onclick="registerVendor()">S'inscrire</button>
<p id="vendorStatus"></p>
</div>

<!-- LIVRAISON -->
<div class="section">
<h3>Livraison rapide</h3>
<button onclick="requestDelivery()">Demander un livreur</button>
</div>

<!-- ADMIN -->
<div class="section">
<h3>Admin Dashboard</h3>
<div id="admin"></div>
</div>

</div>

<!-- PANIER -->
<div class="cart" id="cart">
<h4>Panier</h4>
<div id="cartItems"></div>
<button onclick="checkout()">Commander</button>
<button onclick="payer()">Payer maintenant</button>
</div>

<script>

let cart = [];
let vendors = [];

const products = [
{name:"Sac africain", price:15000, img:"https://images.unsplash.com/photo-1593032465175-481ac7f401a0"},
{name:"Chaussures homme", price:20000, img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{name:"Perruque", price:25000, img:"https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9"},
{name:"Poisson fumé", price:5000, img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"},
{name:"Riz local", price:8000, img:"https://images.unsplash.com/photo-1586201375761-83865001e31c"},
{name:"Montre homme", price:18000, img:"https://images.unsplash.com/photo-1523170335258-f5ed11844a49"}
];

const container = document.getElementById("products");

products.forEach(p=>{
container.innerHTML += `
<div class="card">
<div class="badge">✔ Vérifié</div>
<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.price} FCFA</p>
<button onclick='addToCart(${JSON.stringify(p)})'>Ajouter au panier</button>
<button onclick='buyNow(${JSON.stringify(p)})'>Acheter</button>
</div>
`;
});

function addToCart(p){
cart.push(p);
updateCart();
}

function updateCart(){
document.getElementById("count").innerText = cart.length;

let html="";
cart.forEach(item=>{
html += `<p>${item.name} - ${item.price} FCFA</p>`;
});
document.getElementById("cartItems").innerHTML = html;
}

function toggleCart(){
let c = document.getElementById("cart");
c.style.display = c.style.display === "block" ? "none" : "block";
}

function checkout(){
let message = "Commande YORIX:%0A";
message += "Paiement sécurisé requis.%0A";

cart.forEach(i=>{
let commission = i.price * 0.1;
message += `${i.name} - ${i.price} FCFA (commission incluse)%0A`;
});

window.open(`https://wa.me/237696565654?text=${message}`);
}

function buyNow(p){
window.open(`https://wa.me/237696565654?text=Je veux acheter ${p.name} à ${p.price} FCFA`);
}

function payer(){
window.open("https://paystack.com/pay/yorix-demo");
}

function registerVendor(){
let name = document.getElementById("vendorName").value;
let phone = document.getElementById("vendorPhone").value;

vendors.push({name, phone});

document.getElementById("vendorStatus").innerText =
"Compte vendeur créé";

loadAdmin();
}

function loadAdmin(){
let html = "<b>Produits :</b><br>";

products.forEach(p=>{
html += `${p.name} - ${p.price}<br>`;
});

html += "<br><b>Vendeurs :</b><br>";

vendors.forEach(v=>{
html += `${v.name} - ${v.phone}<br>`;
});

document.getElementById("admin").innerHTML = html;
}

function requestDelivery(){
window.open("https://wa.me/237696565654?text=Je veux une livraison");
}

loadAdmin();

</script>

</body>
</html>
